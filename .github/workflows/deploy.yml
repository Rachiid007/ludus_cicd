name: Deploy Ludus Range
on:
  push:
    paths:
      - 'config/ludus/ludus-range-config.yml'
  workflow_dispatch:

jobs:
  deploy_range:
    runs-on: ubuntu-latest
    env:
      LUDUS_API_KEY: ${{ secrets.LUDUS_API_KEY }}
    permissions:
      contents: read    # Only need read access to code
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false  # Don't store GitHub token in git config
          fetch-depth: 0              # Use full history if needed

      - name: Install WireGuard
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard

      - name: Write WireGuard Config
        env:
          WIREGUARD_CONFIG: ${{ secrets.WIREGUARD_CONFIG }}
        shell: bash
        run: printf "%s" "$WIREGUARD_CONFIG" > wg0.conf

      - name: Activate WireGuard VPN
        run: sudo wg-quick up ./wg0.conf

      - name: Install Ludus CLI non-interactively
        run: |
          # Verify that the 'script' command exists (it should be on ubuntu-latest)
          if ! command -v script >/dev/null; then
            echo "Error: script command not found. Aborting."
            exit 1
          fi
          # Run the installer inside a pseudo-TTY so it can process piped responses.
          script -q -c 'printf "Y\nY\n" | curl -s https://ludus.cloud/install | bash' /dev/null

      - name: Set Ludus API key non-interactively
        run: |
          # Use a pseudo-TTY to feed the API key into the 'ludus apikey' command.
          # This ensures the key is registered in the CLI's keyring.
          script -q -c 'printf "%s\n" "$LUDUS_API_KEY" | ludus apikey' /dev/null

      - name: Confirm Ludus API key is set
        run: echo "Ludus API key successfully set in CLI"

      - name: Deploy Ludus Range
        run: |
          ludus range config set -f ./config/ludus/ludus-range-config.yml
          ludus range deploy

      - name: Disconnect WireGuard
        if: always()
        run: sudo wg-quick down ./wg0.conf
